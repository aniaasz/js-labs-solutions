<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation</title>
  <script
          src="https://home.agh.edu.pl/~polak/jezyki/js/lab/calculatePrimes.js"></script>

<!--REACT-->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

<div id="react-container">



</div>


<form onsubmit="event.preventDefault();">
  <h2>requestAnimationFrame()</h2>
  <label for="counter">Counter→</label>
  <output id="counter" style="font-size: 4vh; color: red;">0</output>
  <br>
  <button id="start" onclick="startAnimation()">Start</button>
  <button id="stop" disabled onclick="stopAnimation()">Stop</button>
  <!-- ************************************************************** -->
  <hr>
  <h2>Time-consuming calculations in the main thread</h2>
  <label for="result_main">Result:</label>
  <output id="result_main">0</output>
  <br>
  <label for="iterations_main">Number of iterations:</label>
  <input id="iterations_main" type="text" value="50"
         onfocus="document.forms[0].result_main.value ='0'">
  <button
          onclick="document.forms[0].result_main.value = calculatePrimes(document.forms[0].iterations_main.value || 50)">Run
    calculations</button>
  <!-- ************************************************************** -->
  <h2>Time-consuming calculations in a separate thread</h2>
  <label for="result_worker">Result:</label>
  <output id="result_worker">0</output>
  <br>
  <label for="iterations_worker">Number of iterations:</label>
  <input id="iterations_worker" type="text" value="50"
         onfocus="document.forms[0].result_worker.value ='0'">
  <button
          onclick="calculatePrimesInBackground(document.forms[0].iterations_worker.value || 50)">Run
    calculations</button>
</form>
<script>
  let animation;
  let counter = 0;

  function calculatePrimesInBackground(iterations) {
    // window.alert('Implement missing functionality')
    const worker = new Worker("worker.js");
    worker.postMessage(iterations)

    worker.onmessage = function(event) {
      console.log(event);
      document.getElementById('result_worker').value = event.data;
    }

    worker.onerror = function(error) {
      console.error("Błąd w wątku roboczym" + error.message);
      window.alert("Błąd w wątku roboczym" + error.message);
    };
  }

  function startAnimation() {
    document.forms[0].start.disabled = true;
    document.forms[0].stop.disabled = false;
    animation = window.requestAnimationFrame(step);
  }

  function step() {
    document.forms[0].counter.value = counter++;
    animation = window.requestAnimationFrame(step);
  }

  function stopAnimation() {
    document.forms[0].start.disabled = false;
    document.forms[0].stop.disabled = true;
    window.cancelAnimationFrame(animation)
  }

</script>
<script type="text/babel">

  const {useEffect, useState} = React;

  const Counter = ({ initial, delay }) => {

    const [counter, setCounter] = useState(parseInt(initial) || 0);
    const [isRunning, setIsRunning] = useState(false);
    let timer;

    useEffect(() => {
      if (isRunning) {
        timer = setInterval(() => {
          setCounter(prev => prev + 1);
        },parseInt(delay) || 1000);

        return () => { if (timer) clearInterval(timer)};

      }
    },[isRunning,delay]);

    return (

     <div style={{backgroundColor: 'palegreen',border: '1px solid green',borderRadius: '10px'}}>

       <div style={{display: 'flex', flexDirection: 'row', alignItems: 'center',gap: '10px',marginLeft: '10px'}}>
         <h1>Counter→</h1>
         <p style={{fontSize: 40, color: 'red'}}>{counter}</p>
       </div>

       <div style={{marginLeft: '10px',marginBottom: '20px'}}>
         <button onClick={() => setIsRunning(false)}>Stop</button>
         <button onClick={() => setIsRunning(true)}>Start</button>
       </div>



     </div>
    )

  };

  const App = () => (
          <div>
            <h2>React counters</h2>
            <div style={{ display: 'flex', flexDirection: 'column',gap: '15px' }}>
                <Counter initial="10" delay="1000" />
                <Counter initial="15" delay="500" />
            </div>
          </div>
  );

  const root = ReactDOM.createRoot(document.getElementById('react-container'));
  root.render(<App />);



</script>
</body>

</html>
