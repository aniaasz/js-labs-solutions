<script>

    const rezerwacje = [];
    const pokoje = [
        { nr: 101, miejsca: 1 },
        { nr: 102, miejsca: 2 },
        { nr: 103, miejsca: 3 },
        { nr: 201, miejsca: 5 },
        { nr: 202, miejsca: 4 },
        { nr: 203, miejsca: 3 },
    ];
    const klienci = [
        "Jan Kowalski", "Piotr Nowak", "Jakub Mróz",
        "Basia Górska", "Ala Cedro", "Julia Kowal"
    ];

    console.log("Dopuszczalni goście:", klienci);

    function dodaj(gosc, nrPokoju) {
        // const listaRezerwacji = document.getElementById("wynik-rezerwacji");
        // listaRezerwacji.innerHTML = "";
        if (!klienci.includes(gosc)) {
            console.error("Brak klienta w bazie");
            window.alert("Brak klienta w bazie");
            return;
        }
        if (!pokoje.some(p => p.nr == nrPokoju)) {
            console.error("Brak pokoju w bazie");
            window.alert("Brak pokoju w bazie");
            return;
        }

        const transaction = db.transaction(["rezerwacje"], "readwrite");
        const store = transaction.objectStore("rezerwacje");



        // https://developer.mozilla.org/en-US/docs/Web/API/IDBObjectStore/count

        const request = store.openCursor();
        const danePokoju = pokoje.find(p => p.nr == nrPokoju);

        let licznikZajetych = 0;

        request.onsuccess = (event) => {
            const cursor = event.target.result;

            if (cursor) {
                if (cursor.value.pokoj == nrPokoju) {
                    licznikZajetych++;
                }
                cursor.continue();
            } else {
                if (licznikZajetych >= danePokoju.miejsca) {
                    window.alert(`Brak miejsc w pokoju`);
                } else {
                    const nowaRezerwacja = {gosc: gosc, pokoj: nrPokoju};
                    const dodajRezerwacje = store.add(nowaRezerwacja);

                    dodajRezerwacje.onsuccess = () => {
                        console.log("Dodano nową rezerwację");
                        window.alert(`Zarezerwowano pokój ${nrPokoju} dla: ${gosc}`);
                    };
                    dodajRezerwacje.onerror = () => console.error("Błąd zapisu");
                }
            }


        }
    }

    function usun(gosc, nrPokoju){
        // const listaRezerwacji = document.getElementById("wynik-rezerwacji");
        // listaRezerwacji.innerHTML = "";

        if (!klienci.includes(gosc)) {
            console.error("Brak klienta w bazie");
            window.alert("Brak klienta w bazie");
            return;
        }
        if (!pokoje.some(p => p.nr == nrPokoju)) {
            console.error("Brak pokoju w bazie");
            window.alert("Brak pokoju w bazie");
            return;
        }

        const transaction = db.transaction(["rezerwacje"], "readwrite");
        const store = transaction.objectStore("rezerwacje");


        // https://developer.mozilla.org/en-US/docs/Web/API/IDBObjectStore/openCursor
        const request = store.openCursor();
        request.onsuccess = (event) => {
            const cursor = event.target.result;

            if (cursor) {
                if (cursor.value.gosc === gosc && cursor.value.pokoj == nrPokoju) {
                    const usuwanaRezerwacja = cursor.delete();
                    usuwanaRezerwacja.onsuccess = () => console.log("Usunięto rezerwację");
                    window.alert(`Usunięto rezerwację pokoju: ${nrPokoju} dla: ${gosc}`);
                    return;
                }
                cursor.continue();
            } else {
                console.error("Nie znaleziono takiej rezerwacji");
                window.alert("Nie znaleziono takiej rezerwacji");
            }
        };

        request.onerror = () => console.error("Błąd bazy");
    }

    function wyswietl(nrPokoju){
        const listaRezerwacji = document.getElementById("wynik-rezerwacji");
        listaRezerwacji.innerHTML = "";
        if (!pokoje.some(p => p.nr == nrPokoju)) {
            console.error("Brak pokoju w bazie");
            window.alert("Brak pokoju w bazie");
            return;
        }

        const transaction = db.transaction(["rezerwacje"], "readonly");
        const store = transaction.objectStore("rezerwacje");

        let znaleziono = false;
        const request = store.openCursor();

        console.log(`Pokój: ${nrPokoju}`);
        request.onsuccess = (event) => {
            const cursor = event.target.result;
            if (cursor) {
                if (cursor.value.pokoj == nrPokoju) {
                    console.log(`Gość: ${cursor.value.gosc}`);
                    znaleziono = true;
                    const wynik = document.createElement('li');
                    wynik.textContent = cursor.value.gosc;
                    listaRezerwacji.appendChild(wynik);
                }
                cursor.continue();
            } else {
                if (!znaleziono) {
                    console.error("Brak rezerwacji dla tego pokoju");
                    const wynik = document.createElement('li');
                    wynik.textContent = "Brak rezerwacji";
                    listaRezerwacji.appendChild(wynik);
                }
            }
        };
    }


    let db;
    const request = indexedDB.open("HotelDB", 1);


    request.onupgradeneeded = (event) => {
        db = event.target.result;

        if (!db.objectStoreNames.contains("rezerwacje")) {
            db.createObjectStore("rezerwacje", { keyPath: "id", autoIncrement: true });
        }

    };

    request.onsuccess = (event) => {
        db = event.target.result;
        const formularz = document.forms["formularz-zarezerwuj"]

        if (formularz) {

            const parametry = formularz.elements["formularz-input"]

            formularz.elements["btn-dodaj"].onclick = (event) => {
                const dane = parametry.value.split(',')
                if (dane.length === 2) {
                    dodaj(dane[0].trim(), dane[1].trim());
                } else {
                    window.alert("Wpisz: Imię Nazwisko, NrPokoju");
                }
            }
            formularz.elements["btn-usun"].onclick = (event) => {
                const dane = parametry.value.split(',')
                if (dane.length === 2) {
                    usun(dane[0].trim(), dane[1].trim());
                } else {
                    window.alert("Wpisz: Imię Nazwisko, NrPokoju");
                }
            }
            formularz.elements["btn-wyswietl"].onclick = (event) => {
                const dane = parametry.value.split(',')
                if (dane.length === 1) {
                    wyswietl(dane[0].trim());
                } else {
                    window.alert("Wpisz: NrPokoju");
                }
            }

        }

    };


    request.onerror = (event) => {
        console.error(`Database error: ${event.target.error?.message}`);
    };

</script>

<script type="text/jsx">

    const { useState, useEffect } = React;

    const KartaPokoju = ({room,guests,onRefresh}) => {
        const isFull = guests.length >= room.miejsca;

        // Usuwanie przez podwójne kliknięcie na konkretną rezerwację
        const handleDoubleClick = (gosc) => {
            usun(gosc, room.nr);
            onRefresh();
        };

        // Dodawanie przez kliknięcie pojedynczo
        // otwiera się prompt do wpisania danych klienta
        const handleAdd = () => {
            if (isFull) return;
            const gosc = window.prompt("Podaj imię i nazwisko gościa:");
            if (gosc) {
                dodaj(gosc, room.nr);
                onRefresh();
            }
        };

        return (

            <div className="col-12 col-md-6 col-lg-4 mb-4">
                <div className={`card ${isFull ? `bg-secondary-subtle` : `bg-light`  }`} style={{ width: '18rem' }} >
                    <div className="card-body">
                        <h5 className={`card-title ${isFull ? `text-danger`: `text-success`}`} onClick= {handleAdd}>Pokój nr {room.nr}</h5>
                        <p className={`small mb-0 ${isFull ? `text-danger`: `text-success`}`} onClick= {handleAdd}>Max ilość miejsc: {room.miejsca}</p>
                        <p className={`small mb-2 ${isFull ? `text-danger`: `text-success`}`} onClick= {handleAdd}>Wolna ilość miejsc: {room.miejsca - guests.length}</p>
                        <div className="card-text">
                            <ul className="list-group">
                                {guests.length > 0 ?
                                    (
                                        guests.map((el, index) => (
                                                <li key={index} className={`list-group-item ${isFull ? `bg-secondary-subtle` : `bg-light text-black`  }`} onDoubleClick={() => handleDoubleClick(el.gosc)}>
                                                    {el.gosc}
                                                </li>
                                            ))
                                    )
                                    :
                                    (
                                        <li className="list-group-item text-muted fst-italic bg-light">
                                            Brak rezerwacji
                                        </li>
                                    )
                                }

                            </ul>

                        </div>
                    </div>
                </div>
            </div>

        )
    }


    const App = () => {

        const [reservations, setReservations] = React.useState([]);

        const refreshData = () => {
            if (!db) return;

            const transaction = db.transaction(["rezerwacje"], "readonly");
            const store = transaction.objectStore("rezerwacje");
            const request = store.getAll();

            request.onsuccess = () => {
                setReservations(request.result);
            };
        };


        React.useEffect(() => {
            if (db) refreshData();
            else {
                const interval = setInterval(() => {
                    if (db) {
                        refreshData();
                        clearInterval(interval);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }

        }, []);

        return (

            <div className="container mt-2 mb-5">
                <h1 className="mb-4 text-center">Rezerwacje</h1>
                <div className="row">
                    {pokoje.map(pokoj => (
                        <KartaPokoju
                            key={pokoj.nr}
                            room={pokoj}
                            guests={reservations.filter(r => r.pokoj == pokoj.nr)}
                            onRefresh={refreshData}
                        />
                    ))}
                </div>
            </div>

        )
    }


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

</script>
